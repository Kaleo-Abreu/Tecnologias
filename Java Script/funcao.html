<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="veiculo.js"></script>
    <title>Programação Front-End</title>
</head>
<body>
    <h1>Programação Front-End</h1>    

    <script>
        function saudacao(nome) {
            document.write("Olá, mundo!<br>");

        }
        saudacao();


        function exibirMensagem(cumprimento, nome) {
            document.write(cumprimento +", " + nome + "! <br>");
        }
        exibirMensagem("Bom dia", "Kaleo");


        function somar(a, b) {
            return a + b;
        }
        document.write("Soma de: " +  somar(15, 5));


        function multiplicacao(a, b) {
            return a * b;
        }
        document.write("<br>Multiplicação de: " +  multiplicacao(15, 5));

       
    </script>
</body>
</html>
